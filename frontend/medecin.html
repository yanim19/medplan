<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Espace Médecin</title>
</head>
<body>

    <h2>Gestion du planning</h2>

    <button>Ajouter un créneau</button>

    <table border="1">
    <tr>
        <th>Date</th>
        <th>Action</th>
    </tr>
    <tr>
        <td>10/02/2026 - 10:00</td>
        <td>
            <button onclick="modifier(1)">Modifier</button>
            <button onclick="supprimer(1)">Supprimer</button>
        </td>
    </tr>
       
    </table>
    <script>

// supprimer
function supprimer(id){
  fetch("http://localhost:3000/availability/" + id, {
    method: "DELETE"
  })
  .then(res => res.text())
  .then(data => alert(data));
}

// modifier (simple version)
function modifier(id){
  const nouvelleDate = prompt("Nouvelle date ?");
  
  fetch("http://localhost:3000/availability/" + id, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ date: nouvelleDate })
  })
  .then(res => res.text())
  .then(data => alert(data));
}

</script>

</body>
</html>
