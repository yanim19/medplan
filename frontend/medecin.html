<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Espace Médecin</title>
</head>
<body>

    <h2>Gestion du planning</h2>

    <button>Ajouter un créneau</button>

    <table border="1">
    <tr>
        <th>Date</th>
        <th>Action</th>
    </tr>
    <tr>
        <td>10/02/2026 - 10:00</td>
        <td>
        <button>Modifier</button>
        <button>Supprimer</button>
        </td>
    </tr>
    </table>
  <h2>Liste des médecins disponibles</h2>

<div id="loading">Chargement...</div>
<div id="doctors"></div>

<script>
fetch("http://localhost:3000/doctors")
  .then(response => response.json())
  .then(data => {

    document.getElementById("loading").style.display = "none";

    let html = "";

    data.forEach(doc => {
      html += `
        <div class="card">
          <h3>${doc.nom} ${doc.prenom}</h3>
          <p>Spécialité : ${doc.specialite}</p>
          <button onclick="voirDisponibilite(${doc.id})">
            Voir disponibilité
          </button>
        </div>
      `;
    });

    document.getElementById("doctors").innerHTML = html;
  })
  .catch(error => {
    document.getElementById("loading").innerHTML =
      "Erreur lors du chargement des médecins ❌";
    console.error(error);
  });

function voirDisponibilite(id) {
  alert("Médecin sélectionné ID : " + id);
}
</script>
 

</body>
</html>
