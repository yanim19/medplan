<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Inscription</title>
</head>
<body>

  <h2>Créer un compte</h2>

  <form id="registerForm">
    <label>Nom :</label>
    <input type="text" id="nom" required><br><br>

    <label>Prénom :</label>
    <input type="text" id="prenom" required><br><br>

    <label>Email :</label>
    <input type="email" id="email" required><br><br>

    <label>Mot de passe :</label>
    <input type="password" id="password" required><br><br>

    <label>Rôle :</label>
    <select id="role">
      <option value="patient">Patient</option>
      <option value="medecin">Médecin</option>
    </select><br><br>

    <button type="submit">S'inscrire</button>
  </form>

  <p id="errorMsg" style="color:red; display:none;"></p>
  <p id="successMsg" style="color:green; display:none;"></p>

  <br>
  <a href="login.html">Déjà inscrit ? Se connecter</a>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const nom      = document.getElementById("nom").value.trim();
      const prenom   = document.getElementById("prenom").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const role     = document.getElementById("role").value;

      const errorMsg   = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");

      // Reset messages
      errorMsg.style.display   = "none";
      successMsg.style.display = "none";

      fetch("http://localhost:3000/api/auth/register", {  // ✅ fixed URL
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nom, prenom, email, password, role })
      })
      .then(res => res.json())  // ✅ parse as JSON not text
      .then(data => {
        if (data.message === "Compte créé avec succès !") {
          successMsg.textContent = "Compte créé ! Redirection...";
          successMsg.style.display = "block";

          // Redirect to login after 1.5s
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);

        } else {
          errorMsg.textContent = data.message;
          errorMsg.style.display = "block";
        }
      })
      .catch(err => {
        errorMsg.textContent = "Erreur de connexion au serveur.";
        errorMsg.style.display = "block";
        console.error(err);
      });
    });
  </script>

</body>
</html>
